name: frr
depends:
  - network:
      - addresses
      - etcfiles
      - hostname
  - configuration: true
container:
  entrypoint: /sbin/tini
  args:
    - --
    - /usr/lib/frr/docker-start
  security:
    writeableRootfs: false
    writeableSysfs: true
  mounts:
  - source: /var/run/frr
    destination: /var/run/frr
    type: bind
    options:
      - bind
      - rw
  - source: /var/run/frr
    destination: /var/lib/frr
    type: bind
    options:
      - bind
      - rw
  - source: /tmp
    destination: /var/tmp
    type: bind
    options:
      - bind
      - rw
restart: always
